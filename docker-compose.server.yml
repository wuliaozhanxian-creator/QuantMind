x-strategy-template: &runner-base
  image: quantmind-ml-runtime:latest
  build:
    context: .
    dockerfile: docker/Dockerfile.ml-runtime
  restart: always
  networks:
    quantmind-network:
      aliases:
        - strategy-runner
  volumes:
    - .:/app
    - ./data/models:/data/models
  command: python /app/backend/services/trade/runner/main.py
  environment: &runner-env-base
    PYTHONPATH: /app
    PYTHONDONTWRITEBYTECODE: "1"
    SECRET_KEY: ${SECRET_KEY}
    JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    INTERNAL_CALL_SECRET: ${INTERNAL_CALL_SECRET:-dev-internal-call-secret}
    REDIS_HOST: quantmind-trade-redis
    REDIS_PORT: 6379
    REDIS_PASSWORD: quantmind2026
    TRADE_SERVICE_URL: http://quantmind-trade:8002
    TRADE_SERVICE_INTERNAL_URL: http://quantmind-trade:8002/api/v1/internal/strategy
    ENGINE_SERVICE_INTERNAL_URL: http://quantmind-engine:8001/api/v1
    DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@database-1.ct4aisgi6a10.rds.cn-north-1.amazonaws.com.cn:5432/${DB_NAME:-quantmind}

services:
  # 0. 自管 PostgreSQL（持久化存储，数据保存在 /var/lib/quantmind/postgresql-data）
  quantmind-postgresql:
    image: postgres:18.3-alpine
    container_name: quantmind-PostgreSQL-18.3
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${DB_NAME:-quantmind}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/data
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - /var/lib/quantmind/postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      quantmind-network:
        aliases:
          - quantmind-postgresql
    restart: always
    cpuset: "0-17,36-53"

  # 1. API 网关（Nginx）
  quantmind-gateway:
    image: nginx:1.25-alpine
    container_name: quantmind-gateway
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/cors.conf:/etc/nginx/cors.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - ./website/dist:/usr/share/nginx/html:ro
      - ./website/nginx:/etc/nginx/website-certs:ro
    depends_on:
      - quantmind-api
      - quantmind-trade
      - quantmind-engine
      - quantmind-stream
    networks:
      - quantmind-network
    restart: always
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    cpuset: "0-17,36-53"

  # 3. 回测与通用 Redis
  backtest-redis:
    image: redis:alpine
    container_name: quantmind-backtest-redis
    ports:
      - "16379:6379"
    command: redis-server --appendonly yes --requirepass quantmind2026
    networks:
      quantmind-network:
        aliases:
          - quantmind-backtest-redis
          - backtest-redis
    volumes:
      - /var/lib/quantmind/redis-backtest:/data
    restart: always

  # 4. 实盘交易 Redis
  trade-redis:
    image: redis:alpine
    container_name: quantmind-trade-redis
    ports:
      - "26379:6379"
    command: redis-server --appendonly yes --requirepass quantmind2026
    networks:
      quantmind-network:
        aliases:
          - quantmind-trade-redis
          - trade-redis
    volumes:
      - /var/lib/quantmind/redis-trade:/data
    restart: always
    cpuset: "0-17,36-53"

  # 4.1 行情专用 Redis（仅用于 market:snapshot:*）
  market-redis:
    image: redis:alpine
    container_name: quantmind-market-redis
    ports:
      - "36379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_MARKET_PASSWORD:-quantmind_market_2026}
    networks:
      quantmind-network:
        aliases:
          - quantmind-market-redis
          - market-redis
    volumes:
      - /var/lib/quantmind/redis-market:/data
    restart: always

  # 5. 交易核心服务（统一 runtime 镜像，多入口之一）
  quantmind-trade:
    image: quantmind-trade:latest
    build:
      context: .
      dockerfile: backend/services/trade/Dockerfile
    container_name: quantmind-trade
    depends_on:
      quantmind-postgresql:
        condition: service_healthy
      trade-redis:
        condition: service_started
    environment:
      - TZ=Asia/Shanghai
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - REDIS_HOST=quantmind-trade-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=quantmind2026
      - REMOTE_QUOTE_REDIS_HOST=quantmind-market-redis
      - REMOTE_QUOTE_REDIS_PORT=6379
      - REMOTE_QUOTE_REDIS_PASSWORD=${REDIS_MARKET_PASSWORD:-quantmind_market_2026}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@quantmind-postgresql:5432/${DB_NAME:-quantmind}
      - LIVE_TRADING_MODE=true
      - ENABLE_EXEC_STREAM_CONSUMER=true
      - EXEC_STREAM_PREFIX=qm:exec:stream
      - EXEC_STREAM_TENANTS=default
      - EXEC_STREAM_REDIS_DB=0
      - DOCKER_MODE=true
      - HOST_PROJECT_PATH=/home/quantmind
      - STRATEGY_RUNNER_IMAGE=quantmind-ml-runtime:latest
      - INTERNAL_CALL_SECRET=${INTERNAL_CALL_SECRET:-dev-internal-call-secret}
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      quantmind-network:
        aliases:
          - quantmind-trade
    restart: always
    cpuset: "0-17,36-53"

  # 6. 引擎服务（统一 runtime 镜像，多入口之一）
  quantmind-engine:
    image: quantmind-ml-runtime:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.ml-runtime
    container_name: quantmind-engine
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          cpus: '36'
          memory: 48G
        reservations:
          memory: 8G
    cpuset: "0-17,36-53"
    depends_on:
      quantmind-postgresql:
        condition: service_healthy
      backtest-redis:
        condition: service_started
    command: python backend/services/engine/main.py
    environment:
      - TZ=Asia/Shanghai
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@quantmind-postgresql:5432/${DB_NAME:-quantmind}
      - REDIS_HOST=quantmind-backtest-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=quantmind2026
      - ENABLE_SIGNAL_STREAM_PUBLISH=true
      - ENABLE_VECTORIZED_MATCHER=false
      - SIGNAL_STREAM_PREFIX=qm:signal:stream
      - SIGNAL_STREAM_REDIS_HOST=quantmind-trade-redis
      - SIGNAL_STREAM_REDIS_PORT=6379
      - SIGNAL_STREAM_REDIS_DB=0
      - SIGNAL_STREAM_REDIS_PASSWORD=quantmind2026
      - TRADE_SERVICE_URL=http://quantmind-trade:8002
      - QLIB_CELERY_QUEUE=qlib_backtest
      - AUTO_INFERENCE_ENABLED=false
      - QLIB_JOBLIB_BACKEND=threading
      - ENVIRONMENT=production
      - CELERY_BROKER_URL=redis://:quantmind2026@quantmind-backtest-redis:6379/3
      - CELERY_RESULT_BACKEND=redis://:quantmind2026@quantmind-backtest-redis:6379/4
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - INTERNAL_CALL_SECRET=${INTERNAL_CALL_SECRET:-dev-internal-call-secret}
      - TENCENT_SECRET_ID=${TENCENT_SECRET_ID}
      - TENCENT_SECRET_KEY=${TENCENT_SECRET_KEY}
      - TENCENT_REGION=${TENCENT_REGION:-ap-guangzhou}
      - TENCENT_BUCKET=${TENCENT_BUCKET}
      - QUANTMIND_API_BASE_URL=${QUANTMIND_API_BASE_URL:-http://210.16.175.87:8000}
      - HOST_PROJECT_PATH=${HOST_PROJECT_PATH:-/home/quantmind}
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      quantmind-network:
        aliases:
          - quantmind-engine
    restart: always

  # 7. 行情流服务（统一 runtime 镜像，多入口之一）
  quantmind-stream:
    image: quantmind-stream:latest
    build:
      context: .
      dockerfile: backend/services/stream/Dockerfile
    container_name: quantmind-stream
    ports:
      - "8003:8003"
    depends_on:
      quantmind-postgresql:
        condition: service_healthy
      backtest-redis:
        condition: service_started
      market-redis:
        condition: service_started
    environment:
      - TZ=Asia/Shanghai
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@quantmind-postgresql:5432/${DB_NAME:-quantmind}
      - REDIS_HOST=quantmind-backtest-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=quantmind2026
      - REMOTE_QUOTE_REDIS_HOST=quantmind-market-redis
      - REMOTE_QUOTE_REDIS_PORT=6379
      - REMOTE_QUOTE_REDIS_PASSWORD=${REDIS_MARKET_PASSWORD:-quantmind_market_2026}
      - DEFAULT_SOURCE=remote_redis
      - QLIB_JOBLIB_BACKEND=threading
      - ENVIRONMENT=production
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - INTERNAL_CALL_SECRET=${INTERNAL_CALL_SECRET:-dev-internal-call-secret}
      - TRADE_EVENTS_REDIS_HOST=quantmind-trade-redis
      - TRADE_EVENTS_REDIS_PORT=6379
      - TRADE_EVENTS_REDIS_PASSWORD=quantmind2026
      - TRADE_EVENTS_REDIS_DB=2
    volumes:
      - .:/app
    networks:
      quantmind-network:
        aliases:
          - quantmind-stream
    restart: always
    cpuset: "0-17,36-53"

  # 8. Celery Worker（统一 runtime 镜像，异步回测）
  celery-worker:
    image: quantmind-ml-runtime:latest
    container_name: quantmind-celery-worker
    deploy:
      resources:
        limits:
          cpus: '36'
          memory: 48G
        reservations:
          memory: 8G
    cpuset: "0-17,36-53"
    depends_on:
      quantmind-postgresql:
        condition: service_healthy
      backtest-redis:
        condition: service_started
    environment:
      - TZ=Asia/Shanghai
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@quantmind-postgresql:5432/${DB_NAME:-quantmind}
      - REDIS_HOST=quantmind-backtest-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=quantmind2026
      - QLIB_CELERY_QUEUE=qlib_backtest
      - AUTO_INFERENCE_ENABLED=false
      - QLIB_JOBLIB_BACKEND=threading
      - ENVIRONMENT=production
      - CELERY_BROKER_URL=redis://:quantmind2026@quantmind-backtest-redis:6379/3
      - CELERY_RESULT_BACKEND=redis://:quantmind2026@quantmind-backtest-redis:6379/4
    volumes:
      - .:/app
    networks:
      - quantmind-network
    command: python -m celery -A backend.services.engine.qlib_app.celery_config:celery_app worker -Q qlib_backtest -l info --pool=prefork --autoscale=6,2
    restart: always

  # 9. Celery Beat（统一 runtime 镜像，自动推理定时任务）
  celery-beat:
    image: quantmind-ml-runtime:latest
    container_name: quantmind-celery-beat
    depends_on:
      quantmind-postgresql:
        condition: service_healthy
      backtest-redis:
        condition: service_started
    environment:
      - TZ=Asia/Shanghai
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@quantmind-postgresql:5432/${DB_NAME:-quantmind}
      - REDIS_HOST=quantmind-backtest-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=quantmind2026
      - QLIB_CELERY_QUEUE=qlib_backtest
      - QLIB_JOBLIB_BACKEND=threading
      - ENVIRONMENT=production
      - CELERY_BROKER_URL=redis://:quantmind2026@quantmind-backtest-redis:6379/3
      - CELERY_RESULT_BACKEND=redis://:quantmind2026@quantmind-backtest-redis:6379/4
    volumes:
      - .:/app
    networks:
      - quantmind-network
    command: python -m celery -A backend.services.engine.qlib_app.celery_config:celery_app beat -l info
    restart: always

  # 4. 业务 API 服务
  quantmind-api:
    image: quantmind-ml-runtime:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.ml-runtime
    container_name: quantmind-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G
        reservations:
          memory: 2G
    cpuset: "0-17,36-53"
    depends_on:
      quantmind-postgresql:
        condition: service_healthy
      backtest-redis:
        condition: service_started
    links:
      - quantmind-engine
      - quantmind-trade
    command: python backend/services/api/main.py
    environment:
      - TZ=Asia/Shanghai
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@quantmind-postgresql:5432/${DB_NAME:-quantmind}
      - REDIS_HOST=quantmind-backtest-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=quantmind2026
      - TRADE_SERVICE_URL=http://quantmind-trade:8002
      - ENGINE_SERVICE_URL=http://quantmind-engine:8001
      - QWENPAW_BASE_URL=${QWENPAW_BASE_URL:-http://qwenpaw:8088}
      - QWENPAW_CHANNEL=${QWENPAW_CHANNEL:-console}
      - QWENPAW_TIMEOUT_SECONDS=${QWENPAW_TIMEOUT_SECONDS:-60}
      - QWENPAW_SHARED_FILES_DIR=${QWENPAW_SHARED_FILES_DIR:-/qwenpaw-shared}
      - QWENPAW_SHARED_VISIBLE_DIR=${QWENPAW_SHARED_VISIBLE_DIR:-/app/working}
      - OPENCLAW_MAX_FILE_SIZE_BYTES=${OPENCLAW_MAX_FILE_SIZE_BYTES:-52428800}
      - INTERNAL_CALL_SECRET=${INTERNAL_CALL_SECRET:-dev-internal-call-secret}
      - TRAINING_IMAGE=${TRAINING_IMAGE:-quantmind-ml-runtime:latest}
      - TENCENT_SECRET_ID=${TENCENT_SECRET_ID}
      - TENCENT_SECRET_KEY=${TENCENT_SECRET_KEY}
      - TENCENT_REGION=${TENCENT_REGION:-ap-guangzhou}
      - TENCENT_BUCKET=${TENCENT_BUCKET}
      - TENCENT_COS_URL=${TENCENT_COS_URL}
      - TRAINING_DOCKER_NETWORK=quantmind-network
      - TRAINING_CALLBACK_TIMEOUT_SECONDS=${TRAINING_CALLBACK_TIMEOUT_SECONDS:-600}
      - QUANTMIND_API_BASE_URL=${QUANTMIND_API_BASE_URL:-http://quantmind-api:8000}
      - HOST_PROJECT_PATH=/home/quantmind
      - QLIB_PRIMARY_DATA_PATH=${QLIB_PRIMARY_DATA_PATH:-db/qlib_data}
      - QLIB_FALLBACK_DATA_PATH=${QLIB_FALLBACK_DATA_PATH:-db/qlib_data}
      - QLIB_CELERY_QUEUE=qlib_backtest
    volumes:
      - .:/app
      - qwenpaw-data:/qwenpaw-shared
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      quantmind-network:
        aliases:
          - quantmind-api
    restart: always

networks:
  quantmind-network:
    name: quantmind-network
    external: true

volumes:
  qwenpaw-data:
    external: true
