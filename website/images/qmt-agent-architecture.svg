<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0056b3" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#28a745" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8f9fa" />

  <!-- Cloud Platform -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="700" height="120" rx="10" fill="#e3f2fd" stroke="#0056b3" stroke-width="2" />
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0056b3">QuantMind 云端平台</text>
    
    <!-- Strategy Engine -->
    <rect x="40" y="50" width="140" height="50" rx="5" fill="#ffffff" stroke="#0056b3" stroke-width="1" />
    <text x="110" y="80" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">策略引擎</text>
    
    <!-- Trade Service -->
    <rect x="280" y="50" width="140" height="50" rx="5" fill="#ffffff" stroke="#0056b3" stroke-width="1" />
    <text x="350" y="80" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">交易服务</text>
    
    <!-- Bridge API -->
    <rect x="520" y="50" width="140" height="50" rx="5" fill="#ffffff" stroke="#0056b3" stroke-width="1" />
    <text x="590" y="80" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Bridge API</text>
    
    <!-- Arrows inside Cloud -->
    <line x1="180" y1="75" x2="280" y2="75" stroke="#0056b3" stroke-width="2" marker-end="url(#arrow-blue)" />
    <line x1="420" y1="75" x2="520" y2="75" stroke="#0056b3" stroke-width="2" marker-end="url(#arrow-blue)" />
  </g>

  <!-- WebSocket Connection -->
  <g transform="translate(400, 170)">
    <line x1="0" y1="0" x2="0" y2="80" stroke="#333" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)" />
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="12" fill="#666">WebSocket (wss://)</text>
  </g>

  <!-- Local PC -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="700" height="300" rx="10" fill="#e9ecef" stroke="#495057" stroke-width="2" />
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#495057">您的 Windows 电脑</text>
    
    <!-- QMT Agent Box -->
    <g transform="translate(40, 60)">
      <rect x="0" y="0" width="620" height="140" rx="8" fill="#ffffff" stroke="#28a745" stroke-width="2" />
      <text x="20" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#28a745">QMT Agent</text>
      
      <!-- Bridge Connection -->
      <rect x="40" y="50" width="140" height="60" rx="5" fill="#f1f8ff" stroke="#28a745" stroke-width="1" />
      <text x="110" y="75" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Bridge 连接</text>
      <text x="110" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">心跳上报</text>
      
      <!-- Order Dispatch -->
      <rect x="240" y="50" width="140" height="60" rx="5" fill="#f1f8ff" stroke="#28a745" stroke-width="1" />
      <text x="310" y="75" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">订单派发</text>
      <text x="310" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">状态同步</text>
      
      <!-- QMT Interface -->
      <rect x="440" y="50" width="140" height="60" rx="5" fill="#f1f8ff" stroke="#28a745" stroke-width="1" />
      <text x="510" y="75" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">QMT 接口</text>
      <text x="510" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">账户查询</text>
      
      <!-- Arrows inside Agent -->
      <line x1="180" y1="80" x2="240" y2="80" stroke="#28a745" stroke-width="2" marker-end="url(#arrow-green)" />
      <line x1="240" y1="90" x2="180" y2="90" stroke="#28a745" stroke-width="2" marker-end="url(#arrow-green)" />
      
      <line x1="380" y1="80" x2="440" y2="80" stroke="#28a745" stroke-width="2" marker-end="url(#arrow-green)" />
      <line x1="440" y1="90" x2="380" y2="90" stroke="#28a745" stroke-width="2" marker-end="url(#arrow-green)" />
    </g>
    
    <!-- MiniQMT Terminal -->
    <g transform="translate(240, 220)">
      <rect x="0" y="0" width="220" height="60" rx="5" fill="#ffffff" stroke="#6c757d" stroke-width="1" />
      <text x="110" y="25" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">迅投 QMT 终端</text>
      <text x="110" y="45" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">(MiniQMT)</text>
    </g>
    
    <!-- Arrow Agent to MiniQMT -->
    <line x1="660" y1="130" x2="660" y2="250" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)" />
    <line x1="660" y1="250" x2="460" y2="250" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)" />
  </g>

  <!-- Broker Counter -->
  <g transform="translate(290, 550)">
    <rect x="0" y="0" width="220" height="40" rx="5" fill="#ffffff" stroke="#333" stroke-width="1" />
    <text x="110" y="25" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">券商交易柜台</text>
  </g>
  
  <!-- Arrow MiniQMT to Broker -->
  <line x1="400" y1="530" x2="400" y2="550" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

</svg>
