qlib_init:
  provider_uri: db/qlib_data
  region: cn
  dataset_cache: null
  expression_cache: null

experiment:
  name: T3_Alpha158_Base_v19_tune3
  description: T+3 基线模型，使用 Alpha158 特征（Qlib 数据目录已指向 Alpha158_2026）。

task:
  model:
    class: LightGBMDirect
    module_path: local
    kwargs:
      objective: regression
      metric: l2
      boosting_type: gbdt
      learning_rate: 0.02
      num_leaves: 95
      max_depth: 11
      min_data_in_leaf: 700
      feature_fraction: 0.8
      bagging_fraction: 0.9
      bagging_freq: 1
      lambda_l1: 1.0
      lambda_l2: 5.0
      min_gain_to_split: 0.0
      max_bin: 255
      force_col_wise: true
      num_threads: 32
      num_boost_round: 3500
      early_stopping_rounds: 180

  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: Alpha158
        module_path: qlib.contrib.data.handler
        kwargs:
          start_time: '2016-01-01'
          end_time: '2025-12-31'
          fit_start_time: '2016-01-01'
          fit_end_time: '2023-12-31'
          instruments: all
          label:
            - - Ref($close, -3)/Ref($close, -1) - 1
            - - LABEL0
      segments:
        train: ['2016-01-01', '2023-12-31']
        valid: ['2024-01-01', '2024-12-31']
        test: ['2025-01-01', '2025-12-31']
